<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Tracking dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="first">
        <div class="heading">
          <img src="./images/image-jeremy.png" alt="jeremy" />
          <span>Report for</span>
          <h1>Jeremy Robson</h1>
        </div>
        <div class="list">
          <button type="button" id="daily">daily</button>
          <button type="button" id="weekly">weekly</button>
          <button type="button" id="monthly">monthly</button>
        </div>
      </section>

      <div class="time-grid" id="activityContainer"></div>
    </main>
    <footer>Challenge by Frontend Mentor. Coded by AL-shimaa Gamal.</footer>
    <script type="module" src="main.js"></script>
  </body>
</html>
